      title: 'Встановлення застосунку <strong>Mobilní klíč eGovernmentu</strong>'
      steps:
        - >-
          <strong>Завантажте застосунок.</strong> Встановіть застосунок <strong>Mobilní klíč eGovernmentu</strong> з <a href="https://apps.apple.com/cz/app/mobiln%C3%AD-kl%C3%AD%C4%8D-egovernmentu/id1466762017" target="_blank" rel="noopener noreferrer">App Store</a> або <a href="https://play.google.com/store/apps/details?id=cz.mojedatovaschranka.mobilniklic" target="_blank" rel="noopener noreferrer">Google Play</a>. Він безкоштовно доступний для Android та iOS і офіційно випускається державними органами Чехії.
        - >-
          <strong>Відкрийте сайт Identity občana.</strong> На комп'ютері або іншому пристрої перейдіть на <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>www.identita.gov.cz</strong></a>. Пізніше в розділі способів входу на порталі <strong>Identity občana</strong> ви додасте <strong>Mobilní klíč eGovernmentu</strong>.
    - number: "2"
