      - 'Рівень ідентифікації та вік також можна підтвердити особисто в будь-якому відділенні <a href="https://www.czechpoint.cz/public/" target="_blank" rel="noopener noreferrer"><strong>Czech POINT</strong></a>.'
      - "Після успішного зв'язування перевірка віку в магазині працює так само, як і через <strong>Mobilní klíč</strong>. Магазин лише перевіряє, що вам є 18+."
