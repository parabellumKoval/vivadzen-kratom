cs:
  tabs:
    short: "Krátce"
    full: "Podrobně"
  short:
    intro:
      paragraphs:
        - "Krátký přehled: <strong>Mobilní klíč</strong> nastavíte jednou a pak přes něj ověříte věk během pár sekund."
      alert: "Vivadzen dostane pouze potvrzení, že vám je 18+. Žádné osobní údaje se k nám nepřenášejí."
    sections:
      - number: "1"
        title: "Připravte si aplikaci a přihlášení"
        steps:
          - 'Nainstalujte <strong>Mobilní klíč eGovernmentu</strong> z <a href="https://apps.apple.com/cz/app/mobiln%C3%AD-kl%C3%AD%C4%8D-egovernmentu/id1466762017" target="_blank" rel="noopener noreferrer">App Store</a> nebo <a href="https://play.google.com/store/apps/details?id=cz.mojedatovaschranka.mobilniklic" target="_blank" rel="noopener noreferrer">Google Play</a>.'
          - 'Na <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>identita.gov.cz</strong></a> se přihlaste do <strong>Identity občana</strong>, ideálně přes <strong>Bankovní identitu</strong>.'
      - number: "2"
        title: 'Propojte <strong>Mobilní klíč</strong> s <strong>Identity občana</strong>'
        steps:
          - 'V Portálu <strong>Identity občana</strong> otevřete přihlašovací prostředky a přidejte <strong>Mobilní klíč eGovernmentu</strong>.'
          - "Na telefonu otevřete aplikaci, zvolte aktivaci klíče a naskenujte QR kód zobrazený na počítači."
          - "Dokončete aktivaci nastavením PINu nebo biometrie."
      - number: "3"
        title: "Ověřte věk při nákupu"
        steps:
          - 'V košíku vyberte ověření věku přes <strong>Mobilní klíč eGovernmentu</strong>.'
          - "Otevřete aplikaci, naskenujte QR kód a potvrďte předání informace, že vám je 18+."
          - "Po potvrzení se vrátíte do objednávky a můžete ji dokončit."
    important:
      title: "Příště už jen"
      paragraphs:
        - "První nastavení děláte jen jednou."
      steps:
        - "otevřít aplikaci,"
        - "naskenovat QR kód,"
        - "potvrdit ověření."
      footer: "Hotovo během několika vteřin."
    alternative:
      title: "Alternativa"
      text: 'Můžete použít také <a href="https://www.mojeid.cz/" target="_blank" rel="noopener noreferrer"><strong>MojeID</strong></a>.'
      bullets:
        - 'Propojte <strong>MojeID</strong> s Identitou občana online nebo si identitu ověřte na <a href="https://www.czechpoint.cz/public/" target="_blank" rel="noopener noreferrer"><strong>Czech POINT</strong></a>.'
  intro:
    paragraphs:
      - "Dle aktuální legislativy v ČR vivadzen s.r.o. jako prodejce psychomoduláčních látek musí u každého zákazníka ověřit věk."
      - "Proces probíhá přes státní službu <strong>Mobilní klíč eGovernmentu</strong> nebo jiné prostředky <strong>Identity občana</strong>."
    alert: "VAŠE DATA JSOU V BEZPEČÍ. OBDRŽÍME POUZE INFORMACI, ZDA VÁM JE 18+ LET. Žádné osobní údaje k nám nepřichází a neukládáme je."
  sections:
    - number: "1"
      title: 'Stažení aplikace <strong>Mobilní klíč eGovernmentu</strong>'
      steps:
        - >-
          <strong>Stáhněte si aplikaci.</strong> Do svého mobilního telefonu si nainstalujte aplikaci <strong>Mobilní klíč eGovernmentu</strong> z <a href="https://apps.apple.com/cz/app/mobiln%C3%AD-kl%C3%AD%C4%8D-egovernmentu/id1466762017" target="_blank" rel="noopener noreferrer">App Store</a> nebo <a href="https://play.google.com/store/apps/details?id=cz.mojedatovaschranka.mobilniklic" target="_blank" rel="noopener noreferrer">Google Play</a>. Pro Android i iOS je zdarma a oficiálně vydaná státní správou.
        - >-
          <strong>Otevřete web Identity občana.</strong> Na počítači nebo jiném zařízení přejděte na <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>www.identita.gov.cz</strong></a>. Ve správě přihlašovacích prostředků v Portálu <strong>Identity občana</strong> budete později přidávat <strong>Mobilní klíč eGovernmentu</strong>.
    - number: "2"
      title: 'Přihlášení do <strong>Identity občana</strong>'
      steps:
        - 'Na stránce <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>identita.gov.cz</strong></a> zvolte možnost <strong>Přihlásit se do Identity občana</strong>.'
        - 'Jako doporučený způsob vyberte <strong>Bankovní identitu</strong>, například vaši banku, kde máte internetové bankovnictví.'
        - "Je to nejrychlejší a nejpohodlnější varianta."
        - "Přihlaste se stejně, jako se přihlašujete do internetového bankovnictví."
        - 'Po úspěšném přihlášení se ocitnete ve správě svého profilu v Portálu <strong>Identity občana</strong>.'
      note: 'Přihlášení probíhá přes <strong>Identity občana</strong> a službu <strong>NIA</strong>.'
    - number: "3"
      title: "Propojení aplikace s vaším profilem"
      lead: 'Po přihlášení uvidíte přehled přihlašovacích prostředků. Zde budete přidávat <strong>Mobilní klíč eGovernmentu</strong>.'
      steps:
        - 'V Portálu Identity občana přejděte do části <strong>Přihlašovací prostředky</strong> v levém menu.'
        - 'V seznamu prostředků najděte položku <strong>Mobilní klíč eGovernmentu</strong> a klikněte na ikonu plus pro přidání nového klíče.'
        - "Na obrazovce počítače se zobrazí QR kód pro aktivaci aplikace ve vašem telefonu."
        - "Platnost QR kódu je časově omezená, obvykle přibližně 5 minut. Pokud to nestihnete, můžete si kód kdykoliv vygenerovat znovu."
      note: 'QR kód slouží k propojení aplikace s vaší <strong>Identity občana</strong>.'
    - number: "4"
      title: 'Aktivace <strong>Mobilního klíče</strong>'
      steps:
        - 'Na svém telefonu otevřete aplikaci <strong>Mobilní klíč eGovernmentu</strong>.'
        - 'Na úvodní obrazovce zvolte možnost <strong>Aktivace klíče k identitě občana</strong>.'
        - 'V dalším kroku klikněte na tlačítko <strong>Mám hotovo – načíst kód pro připojení</strong>.'
        - "Namiřte fotoaparát telefonu na QR kód zobrazený na monitoru počítače."
        - 'Telefon vás vyzve k nastavení PINu nebo biometrického přihlášení. Tím dokončíte propojení aplikace s vaší <strong>Identity občana</strong>.'
      tips:
        - 'V aplikaci zvolte možnost „<strong>Aktivace klíče k identitě občana</strong>“ a tím začnete propojení s účtem <strong>Identity občana</strong>.'
        - 'Po zobrazení QR kódu na počítači klikněte v aplikaci na „<strong>Mám hotovo – načíst kód pro připojení</strong>“ a kód naskenujte.'
    - number: "5"
      title: "Ověření věku při nákupu"
      steps:
        - "Na našem e-shopu vložte vybrané produkty do košíku a přejděte k objednávce."
        - 'V košíku nebo během objednávky zvolte možnost ověření věku pomocí <strong>Mobilního klíče eGovernmentu</strong>.'
        - "Na obrazovce e-shopu se zobrazí QR kód pro ověření věku."
        - 'Na mobilu otevřete aplikaci <strong>Mobilní klíč eGovernmentu</strong>, naskenujte QR kód a potvrďte odeslání informace o věku.'
        - "Aplikace předá pouze údaj, zda jste starší 18 let. Nepředává rodné číslo, adresu ani jiné citlivé osobní údaje."
        - "Po potvrzení se vrátíte zpět do košíku, kde můžete objednávku dokončit."
      lead: 'Jakmile máte <strong>Mobilní klíč</strong> jednou nastavený, je každé další ověření věku otázkou několika vteřin.'
  important:
    title: "Důležité"
    paragraphs:
      - 'Celý proces aktivace <strong>Mobilního klíče</strong> absolvujete pouze jednou.'
      - "Při dalších objednávkách už jen:"
    steps:
      - 'otevřete aplikaci <strong>Mobilní klíč eGovernmentu</strong>,'
      - "naskenujete QR kód v košíku,"
      - "potvrdíte ověření věku."
    footer: "Celé ověření pak zabere jen pár vteřin a můžete ihned dokončit nákup."
  alternative:
    title: 'Alternativní možnost: <strong>MojeID</strong>'
    text: 'Pokud vám <strong>Mobilní klíč</strong> nevyhovuje, můžete využít také službu <a href="https://www.mojeid.cz/" target="_blank" rel="noopener noreferrer"><strong>MojeID</strong></a>.'
    bullets:
      - 'Účet <strong>MojeID</strong> si můžete propojit s Identitou občana online, například opět přes <strong>Bankovní identitu</strong>.'
      - 'Úroveň identity a věk si můžete nechat ověřit také osobně na jakékoliv pobočce <a href="https://www.czechpoint.cz/public/" target="_blank" rel="noopener noreferrer"><strong>Czech POINT</strong></a>.'
      - 'Po úspěšném propojení funguje ověření věku na e-shopu podobně jako u <strong>Mobilního klíče</strong>. E-shop pouze ověří, zda je vám 18+.'

en:
  tabs:
    short: "Short"
    full: "Full"
  short:
    intro:
      paragraphs:
        - "Quick overview: set up Mobile Key once and then verify your age in a few seconds."
      alert: "Vivadzen receives only confirmation that you are 18+. No personal data is transferred to us."
    sections:
      - number: "1"
        title: "Prepare the app and sign-in"
        steps:
          - 'Install Mobile Key eGovernment from the <a href="https://apps.apple.com/cz/app/mobiln%C3%AD-kl%C3%AD%C4%8D-egovernmentu/id1466762017" target="_blank" rel="noopener noreferrer">App Store</a> or <a href="https://play.google.com/store/apps/details?id=cz.mojedatovaschranka.mobilniklic" target="_blank" rel="noopener noreferrer">Google Play</a>.'
          - 'Go to <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>identita.gov.cz</strong></a> and sign in to Citizen Identity, ideally through Bank Identity.'
      - number: "2"
        title: "Connect Mobile Key to Citizen Identity"
        steps:
          - "In the Citizen Identity Portal, open sign-in methods and add Mobile Key eGovernment."
          - "Open the app on your phone, start key activation, and scan the QR code shown on your computer."
          - "Finish the setup by creating a PIN or enabling biometrics."
      - number: "3"
        title: "Verify your age during checkout"
        steps:
          - "In the cart, choose age verification using Mobile Key eGovernment."
          - "Open the app, scan the QR code, and confirm sending the 18+ verification."
          - "You will return to checkout and can finish the order."
    important:
      title: "Next time"
      paragraphs:
        - "You only do the setup once."
      steps:
        - "open the app,"
        - "scan the QR code,"
        - "confirm verification."
      footer: "Done in a few seconds."
    alternative:
      title: "Alternative"
      text: 'You can also use <a href="https://www.mojeid.cz/" target="_blank" rel="noopener noreferrer"><strong>MojeID</strong></a>.'
      bullets:
        - 'Connect <strong>MojeID</strong> with Citizen Identity online or verify your identity at <a href="https://www.czechpoint.cz/public/" target="_blank" rel="noopener noreferrer"><strong>Czech POINT</strong></a>.'
  intro:
    paragraphs:
      - "Under current Czech legislation, vivadzen s.r.o. must verify the age of every customer when selling psychomodulating substances."
      - "The process runs through the state Mobile Key eGovernment service or other Citizen Identity methods."
    alert: "YOUR DATA IS SAFE. WE RECEIVE ONLY THE INFORMATION WHETHER YOU ARE 18+ YEARS OLD. No personal data is transferred to us or stored by us."
  sections:
    - number: "1"
      title: "Download the Mobile Key eGovernment app"
      steps:
        - >-
          <strong>Download the app.</strong> Install the Mobile Key eGovernment app from the <a href="https://apps.apple.com/cz/app/mobiln%C3%AD-kl%C3%AD%C4%8D-egovernmentu/id1466762017" target="_blank" rel="noopener noreferrer">App Store</a> or <a href="https://play.google.com/store/apps/details?id=cz.mojedatovaschranka.mobilniklic" target="_blank" rel="noopener noreferrer">Google Play</a>. It is available for Android and iOS free of charge and is officially provided by the Czech state administration.
        - >-
          <strong>Open the Citizen Identity website.</strong> On a computer or another device, go to <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>www.identita.gov.cz</strong></a>. Later, in the Citizen Identity Portal, you will add Mobile Key eGovernment in the sign-in methods section.
    - number: "2"
      title: "Sign in to Citizen Identity"
      steps:
        - 'On <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>identita.gov.cz</strong></a> choose <strong>Sign in to Citizen Identity</strong>.'
        - 'As the recommended option, select <strong>Bank Identity</strong>, for example your bank where you already use internet banking.'
        - "This is the fastest and most convenient option."
        - "Sign in the same way you sign in to internet banking."
        - "After successful sign-in you will see your profile administration in the Citizen Identity Portal."
      note: "The sign-in is processed via Citizen Identity and the <strong>NIA</strong> service."
    - number: "3"
      title: "Connect the app to your profile"
      lead: "After signing in, you will see an overview of sign-in methods. This is where you add Mobile Key eGovernment."
      steps:
        - 'In the Citizen Identity Portal, open the <strong>Sign-in methods</strong> section in the left menu.'
        - 'In the list of methods, find <strong>Mobile Key eGovernment</strong> and click the plus icon to add a new key.'
        - "A QR code for app activation on your phone will appear on the computer screen."
        - "The QR code is time-limited, usually for around 5 minutes. If you miss it, you can generate a new code at any time."
      note: "The QR code is used only to connect the app to your Citizen Identity."
    - number: "4"
      title: "Activate Mobile Key"
      steps:
        - "Open the Mobile Key eGovernment app on your phone."
        - 'On the start screen choose <strong>Activate a key for Citizen Identity</strong>.'
        - 'In the next step click <strong>I am ready – scan the code to connect</strong>.'
        - "Point your phone camera at the QR code displayed on the computer monitor."
        - "Your phone will ask you to set a PIN or biometric sign-in. This completes the connection between the app and your Citizen Identity."
      tips:
        - "In the app choose “Activate a key for Citizen Identity” to start linking it to your Citizen Identity account."
        - "After the QR code appears on your computer, click “I am ready – scan the code to connect” in the app and scan the code."
    - number: "5"
      title: "Age verification during purchase"
      steps:
        - "On our e-shop, add the selected products to the cart and proceed to checkout."
        - "In the cart or during checkout choose age verification using Mobile Key eGovernment."
        - "A QR code for age verification will appear on the e-shop screen."
        - "Open the Mobile Key eGovernment app on your phone, scan the QR code, and confirm sending the age information."
        - "The app transfers only whether you are older than 18. It does not send your birth number, address, or any other sensitive personal data."
        - "After confirmation, you return to the cart where you can finish the order."
      lead: "Once Mobile Key is set up, every next age verification takes only a few seconds."
  important:
    title: "Important"
    paragraphs:
      - "You complete the Mobile Key activation process only once."
      - "For future orders you only:"
    steps:
      - "open the Mobile Key eGovernment app,"
      - "scan the QR code in the cart,"
      - "confirm the age verification."
    footer: "The whole verification then takes just a few seconds and you can complete your purchase immediately."
  alternative:
    title: 'Alternative option: <strong>MojeID</strong>'
    text: 'If Mobile Key does not suit you, you can also use <a href="https://www.mojeid.cz/" target="_blank" rel="noopener noreferrer"><strong>MojeID</strong></a>.'
    bullets:
      - "You can connect your <strong>MojeID</strong> account with Citizen Identity online, for example via Bank Identity again."
      - 'You can also verify your identity level and age in person at any <a href="https://www.czechpoint.cz/public/" target="_blank" rel="noopener noreferrer"><strong>Czech POINT</strong></a> branch.'
      - "After successful linking, age verification on the e-shop works similarly to Mobile Key. The e-shop only verifies that you are 18+."

ru:
  tabs:
    short: "Кратко"
    full: "Полная"
  short:
    intro:
      paragraphs:
        - "Кратко: <strong>Mobilní klíč</strong> настраивается один раз, а дальше возраст подтверждается за несколько секунд."
      alert: "Vivadzen получает только подтверждение, что вам есть 18+. Персональные данные к нам не передаются."
    sections:
      - number: "1"
        title: "Подготовьте приложение и вход"
        steps:
          - 'Установите <strong>Mobilní klíč eGovernmentu</strong> из <a href="https://apps.apple.com/cz/app/mobiln%C3%AD-kl%C3%AD%C4%8D-egovernmentu/id1466762017" target="_blank" rel="noopener noreferrer">App Store</a> или <a href="https://play.google.com/store/apps/details?id=cz.mojedatovaschranka.mobilniklic" target="_blank" rel="noopener noreferrer">Google Play</a>.'
          - 'Перейдите на <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>identita.gov.cz</strong></a> и войдите в <strong>Identity občana</strong>, удобнее всего через <strong>Bankovní identitu</strong>.'
      - number: "2"
        title: 'Привяжите <strong>Mobilní klíč</strong> к <strong>Identity občana</strong>'
        steps:
          - 'В портале <strong>Identity občana</strong> откройте способы входа и добавьте <strong>Mobilní klíč eGovernmentu</strong>.'
          - "Откройте приложение на телефоне, запустите активацию ключа и отсканируйте QR-код с компьютера."
          - "Завершите настройку, задав PIN или биометрию."
      - number: "3"
        title: "Подтвердите возраст при заказе"
        steps:
          - 'В корзине выберите проверку возраста через <strong>Mobilní klíč eGovernmentu</strong>.'
          - "Откройте приложение, отсканируйте QR-код и подтвердите передачу информации, что вам есть 18+."
          - "После подтверждения вернитесь к заказу и завершите оформление."
    important:
      title: "В следующий раз"
      paragraphs:
        - "Первичная настройка нужна только один раз."
      steps:
        - "открыть приложение,"
        - "отсканировать QR-код,"
        - "подтвердить проверку."
      footer: "Готово за несколько секунд."
    alternative:
      title: "Альтернатива"
      text: 'Можно использовать <a href="https://www.mojeid.cz/" target="_blank" rel="noopener noreferrer"><strong>MojeID</strong></a>.'
      bullets:
        - 'Свяжите <strong>MojeID</strong> с <strong>Identity občana</strong> онлайн или подтвердите личность в отделении <a href="https://www.czechpoint.cz/public/" target="_blank" rel="noopener noreferrer"><strong>Czech POINT</strong></a>.'
  intro:
    paragraphs:
      - "Согласно действующему законодательству Чехии vivadzen s.r.o. как продавец психомодулирующих веществ обязан проверять возраст каждого покупателя."
      - "Процесс проходит через государственный сервис <strong>Mobilní klíč eGovernmentu</strong> или другие средства <strong>Identity občana</strong>."
    alert: "ВАШИ ДАННЫЕ В БЕЗОПАСНОСТИ. МЫ ПОЛУЧАЕМ ТОЛЬКО ИНФОРМАЦИЮ О ТОМ, ЧТО ВАМ ЕСТЬ 18+ ЛЕТ. Никакие персональные данные к нам не передаются и не хранятся."
  sections:
    - number: "1"
      title: 'Установка приложения <strong>Mobilní klíč eGovernmentu</strong>'
      steps:
        - >-
          <strong>Скачайте приложение.</strong> Установите приложение <strong>Mobilní klíč eGovernmentu</strong> из <a href="https://apps.apple.com/cz/app/mobiln%C3%AD-kl%C3%AD%C4%8D-egovernmentu/id1466762017" target="_blank" rel="noopener noreferrer">App Store</a> или <a href="https://play.google.com/store/apps/details?id=cz.mojedatovaschranka.mobilniklic" target="_blank" rel="noopener noreferrer">Google Play</a>. Оно бесплатно доступно для Android и iOS и официально выпускается государственными органами Чехии.
        - >-
          <strong>Откройте сайт Identity občana.</strong> На компьютере или другом устройстве перейдите на <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>www.identita.gov.cz</strong></a>. Позже в разделе способов входа на портале <strong>Identity občana</strong> вы добавите <strong>Mobilní klíč eGovernmentu</strong>.
    - number: "2"
      title: 'Вход в <strong>Identity občana</strong>'
      steps:
        - 'На сайте <a href="https://www.identita.gov.cz" target="_blank" rel="noopener noreferrer"><strong>identita.gov.cz</strong></a> выберите <strong>Войти в Identity občana</strong>.'
        - 'В качестве рекомендуемого варианта выберите <strong>Bankovní identitu</strong>, например свой банк, где у вас уже есть интернет-банкинг.'
        - "Это самый быстрый и удобный вариант."
        - "Авторизуйтесь так же, как входите в интернет-банкинг."
        - 'После успешного входа вы попадёте в управление своим профилем на портале <strong>Identity občana</strong>.'
      note: 'Авторизация проходит через <strong>Identity občana</strong> и сервис <strong>NIA</strong>.'
    - number: "3"
      title: "Связка приложения с вашим профилем"
      lead: 'После входа вы увидите список способов авторизации. Здесь и нужно добавить <strong>Mobilní klíč eGovernmentu</strong>.'
      steps:
        - 'На портале <strong>Identity občana</strong> перейдите в раздел <strong>Способы входа</strong> в левом меню.'
        - 'В списке найдите <strong>Mobilní klíč eGovernmentu</strong> и нажмите значок плюс, чтобы добавить новый ключ.'
        - "На экране компьютера появится QR-код для активации приложения на телефоне."
        - "QR-код действует ограниченное время, обычно около 5 минут. Если не успеете, вы всегда можете сгенерировать новый."
      note: 'QR-код используется только для привязки приложения к вашей <strong>Identity občana</strong>.'
    - number: "4"
      title: 'Активация <strong>Mobilní klíč</strong>'
      steps:
        - 'Откройте приложение <strong>Mobilní klíč eGovernmentu</strong> на телефоне.'
        - 'На стартовом экране выберите <strong>Активация ключа для Identity občana</strong>.'
        - 'На следующем шаге нажмите <strong>Готово, считать код для подключения</strong>.'
        - "Наведите камеру телефона на QR-код, показанный на мониторе компьютера."
        - 'Телефон предложит настроить PIN или биометрический вход. После этого привязка приложения к вашей <strong>Identity občana</strong> будет завершена.'
      tips:
        - 'В приложении выберите «<strong>Активация ключа для Identity občana</strong>», чтобы начать привязку к аккаунту <strong>Identity občana</strong>.'
        - 'Когда QR-код появится на компьютере, нажмите в приложении «<strong>Готово, считать код для подключения</strong>» и отсканируйте код.'
    - number: "5"
      title: "Проверка возраста при покупке"
      steps:
        - "Добавьте нужные товары в корзину на нашем сайте и перейдите к оформлению заказа."
        - 'В корзине или во время оформления выберите проверку возраста через <strong>Mobilní klíč eGovernmentu</strong>.'
        - "На экране магазина появится QR-код для проверки возраста."
        - 'Откройте приложение <strong>Mobilní klíč eGovernmentu</strong> на телефоне, отсканируйте QR-код и подтвердите отправку информации о возрасте.'
        - "Приложение передаёт только факт, что вам больше 18 лет. Дата рождения, адрес и другие чувствительные данные не передаются."
        - "После подтверждения вы вернётесь в корзину и сможете завершить заказ."
      lead: 'После первой настройки <strong>Mobilní klíč</strong> каждая следующая проверка возраста занимает всего несколько секунд.'
  important:
    title: "Важно"
    paragraphs:
      - 'Весь процесс активации <strong>Mobilní klíč</strong> вы проходите только один раз.'
      - "При следующих заказах нужно лишь:"
    steps:
      - 'открыть приложение <strong>Mobilní klíč eGovernmentu</strong>,'
      - "отсканировать QR-код в корзине,"
      - "подтвердить проверку возраста."
    footer: "Вся проверка занимает всего несколько секунд, после чего можно сразу завершить покупку."
  alternative:
    title: 'Альтернатива: <strong>MojeID</strong>'
    text: 'Если <strong>Mobilní klíč</strong> вам не подходит, можно использовать сервис <a href="https://www.mojeid.cz/" target="_blank" rel="noopener noreferrer"><strong>MojeID</strong></a>.'
    bullets:
      - 'Аккаунт <strong>MojeID</strong> можно связать с <strong>Identity občana</strong> онлайн, например снова через <strong>Bankovní identitu</strong>.'
      - 'Уровень идентификации и возраст можно также подтвердить лично в любом отделении <a href="https://www.czechpoint.cz/public/" target="_blank" rel="noopener noreferrer"><strong>Czech POINT</strong></a>.'
      - 'После успешной связки проверка возраста в магазине работает аналогично <strong>Mobilní klíč</strong>. Магазин только проверяет, что вам есть 18+.'

uk:
