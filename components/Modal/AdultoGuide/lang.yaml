        - 'У кошику або під час оформлення виберіть перевірку віку через <strong>Mobilní klíč eGovernmentu</strong>.'
        - "На екрані магазину з'явиться QR-код для перевірки віку."
        - 'Відкрийте застосунок <strong>Mobilní klíč eGovernmentu</strong> на телефоні, відскануйте QR-код і підтвердьте надсилання інформації про вік.'
        - "Застосунок передає лише факт, що вам більше 18 років. Дата народження, адреса та інші чутливі дані не передаються."
