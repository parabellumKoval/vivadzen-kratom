      lead: 'Після входу ви побачите список способів авторизації. Саме тут потрібно додати <strong>Mobilní klíč eGovernmentu</strong>.'
      steps:
        - 'На порталі <strong>Identity občana</strong> перейдіть до розділу <strong>Способи входу</strong> у лівому меню.'
