        - "На екрані комп'ютера з'явиться QR-код для активації застосунку на телефоні."
        - "QR-код діє обмежений час, зазвичай близько 5 хвилин. Якщо не встигнете, ви завжди можете згенерувати новий."
      note: "QR-код використовується лише для прив'язки застосунку до вашої <strong>Identity občana</strong>."
    - number: "4"
      title: 'Активація <strong>Mobilní klíč</strong>'
      steps:
        - 'Відкрийте застосунок <strong>Mobilní klíč eGovernmentu</strong> на телефоні.'
        - 'На стартовому екрані виберіть <strong>Активація ключа для Identity občana</strong>.'
        - 'На наступному кроці натисніть <strong>Готово, зчитати код для підключення</strong>.'
        - "Наведіть камеру телефону на QR-код, показаний на моніторі комп'ютера."
        - "Телефон запропонує налаштувати PIN або біометричний вхід. Після цього прив'язку застосунку до вашої <strong>Identity občana</strong> буде завершено."
      tips:
