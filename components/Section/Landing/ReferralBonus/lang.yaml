ru:
  vivapoints_info: "Мы поощряем вашу активность: за отзывы и написание статей начисляем Viva, которые можно использовать в магазине."
  header:
    title: "Получайте бонусы, рекомендуя Vivadzen"
    lead: "Рекомендации и партнерство — часть нашей культуры. Приглашайте заинтересованных людей и получайте преимущества и бонусы."
    notice_text: "Согласно законодательству мы не можем предлагать скидки и бонусы на этом сайте кратома, но вы можете воспользоваться нашей обширной бонусной системой в международном магазине энтеогенов."
    notice_button: "Перейти в магазин энтеогенов"
    image_alt: "Бонусная программа Vivadzen"
  items:
    discounts:
      title: "Накопительная скидка до 10%"
      description: "Чем больше покупок, тем выше персональная скидка — все считается автоматически."
      image_alt: "Накопительная система скидок"
    affiliate:
      title: "Трехуровневая партнерская программа"
      description: "Создайте систему пассивного дохода и получайте процент с покупок вашей сети."
      image_alt: "Трехуровневая партнерская программа"
    promocodes:
      title: "Еженедельные промокоды для вас и друзей"
      description: "Персональные коды, которыми удобно делиться — экономия с каждой посылкой."
      image_alt: "Еженедельные промокоды"
    vivapoints:
      title: "{pointsName} за активность в экосистеме"
      description: "Мы поощряем участие бонусными баллами VIVA, которые можно использовать в магазине."
      image_alt: "{pointsName} за активность"
  join:
    title: "Присоединяйтесь к партнерской программе Vivadzen"
    description: "Начните строить свою сеть и зарабатывать уже сегодня. Чем больше ваша сеть, тем выше ваш доход!"
    button: "Присоединиться"

