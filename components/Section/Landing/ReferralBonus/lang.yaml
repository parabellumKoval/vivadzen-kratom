    notice_button: "Go to the entheogen store"
    image_alt: "Vivadzen bonus program"
  items:
    discounts:
      title: "Loyalty discount up to 10%"
      description: "The more you buy, the higher your personal discount — calculated automatically."
      image_alt: "Loyalty discount system"
    affiliate:
      title: "Three-level affiliate program"
      description: "Build a passive income system and earn a percentage from purchases across your network."
      image_alt: "Three-level affiliate program"
    promocodes:
      title: "Weekly promo codes for you and friends"
      description: "Personal codes that are easy to share — savings on every parcel."
      image_alt: "Weekly promo codes"
    vivapoints:
      title: "{pointsName} for ecosystem activity"
      description: "We reward participation with bonus VIVA points you can use in the store."
      image_alt: "{pointsName} rewards"
  join:
    title: "Join the Vivadzen affiliate program"
    description: "Start building your network and earning today. The bigger your network, the higher your income!"
    button: "Join"

