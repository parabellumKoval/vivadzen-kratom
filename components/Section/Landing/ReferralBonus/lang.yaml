en:
  vivapoints_info: "We reward your activity: for reviews and writing articles, we credit Viva that you can use in the store."
  header:
    title: "Earn bonuses by recommending Vivadzen"
    lead: "Referrals and partnership are part of our culture. Invite interested people and receive perks and bonuses."
