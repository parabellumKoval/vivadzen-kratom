    password_label: Heslo
    password_new_label: Nové heslo
    password_confirm_label: Potvrzení hesla
    enter_with: Přihlásit se pomocí
    remember_text: Nemáte účet?
    have_account: Už účet máte?
    guest_text: Nebo pokračujte jako host při checkoutu.
    agree_prefix: Souhlasím s
    agree_link: podmínkami a zásadami ochrany osobních údajů
    verify_resend_hint: Pokud dopis nevidíte, zkontrolujte spam nebo odešlete odkaz znovu.
    verify_logged_in: Odeslat znovu pro aktuální účet
    verify_guest: Odeslat znovu na email
    back_to_login: Zpět na přihlášení
    back_to_home: Na hlavní stránku
    go_register: Vytvořit účet
    go_login: Přihlásit se
    forgot_toggle: Nepamatujete si heslo?
    forgot_text: Pošleme odkaz pro nastavení nového hesla.
    reset_submit: Uložit nové heslo
    recovery_submit: Odeslat odkaz
    verification_sent: Potvrzovací email byl odeslán znovu.
    reset_sent: Odkaz na změnu hesla byl odeslán.
    reset_success: Heslo bylo změněno.
    redirect_after_login: Po přihlášení budete vráceni k objednávce.
en:
  auth:
    eyebrow: Personal account
    login_title: Sign in
    register_title: Create account
    verify_title: Verify your email
    reset_title: New password
    login_text: Sign in to manage your orders and reuse saved details during the next checkout.
    register_text: Create an account so your contact details and delivery addresses fill in automatically.
    verify_text: We sent a verification link to your email. Confirm it to sign in and use your account.
    reset_text: Set a new password and sign back in to your account.
    benefits:
      orders_title: Order history
      orders_text: All purchases, statuses, and details in one place.
      addresses_title: Saved addresses
      addresses_text: Reuse delivery addresses in checkout with one click.
      profile_title: Profile and security
      profile_text: Update contacts, email, and password without support.
    email_label: Email
    password_label: Password
    password_new_label: New password
    password_confirm_label: Confirm password
    enter_with: Sign in with
    remember_text: No account yet?
    have_account: Already have an account?
    guest_text: Or continue checkout as a guest.
    agree_prefix: I agree with the
    agree_link: terms and privacy policy
    verify_resend_hint: If you do not see the email, check spam or resend the link.
    verify_logged_in: Resend for current account
    verify_guest: Resend to email
    back_to_login: Back to sign in
    back_to_home: Go to home
    go_register: Create account
    go_login: Sign in
    forgot_toggle: Forgot your password?
    forgot_text: We will email you a reset link.
    reset_submit: Save new password
    recovery_submit: Send link
    verification_sent: Verification email sent again.
    reset_sent: Password reset link sent.
    reset_success: Password has been updated.
    redirect_after_login: After sign in you will be returned to checkout.
ru:
  auth:
