    forgot_text: Мы отправим письмо для сброса пароля.
    reset_submit: Сохранить новый пароль
    recovery_submit: Отправить ссылку
    verification_sent: Письмо с подтверждением отправлено повторно.
    reset_sent: Ссылка для смены пароля отправлена.
    reset_success: Пароль успешно обновлен.
    redirect_after_login: После входа вы вернетесь к оформлению заказа.
