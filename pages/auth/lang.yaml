    agree_link: правилами и политикой конфиденциальности
    verify_resend_hint: Если письмо не видно, проверьте спам или отправьте ссылку повторно.
    verify_logged_in: Отправить повторно для текущего аккаунта
    verify_guest: Отправить повторно на email
    back_to_login: Назад ко входу
    back_to_home: На главную
    go_register: Создать аккаунт
    go_login: Войти
