cs:
  auth:
    eyebrow: Osobní účet
    login_title: Přihlášení
    register_title: Registrace
    verify_title: Potvrďte email
    reset_title: Nové heslo
    login_text: Přihlaste se do účtu, sledujte objednávky a používejte uložené údaje při další objednávce.
    register_text: Vytvořte účet, aby se kontaktní údaje a doručovací adresy vyplňovaly automaticky.
    verify_text: Na email jsme poslali potvrzovací odkaz. Po potvrzení se budete moci přihlásit a používat účet.
    reset_text: Nastavte nové heslo a přihlaste se zpět do svého účtu.
    benefits:
      orders_title: Historie objednávek
      orders_text: Všechny objednávky, stavy a podrobnosti na jednom místě.
