cs:
  modal_titles:
    certificates: 'Certifikáty'
    licenses: 'Licence'
  kratom:
    product:
      age_warning:
        aria_label: 'Upozornění 18+'
        line_1: 'Není určeno osobám mladším 18 let!'
        line_2: 'Ukládat mimo dosah osob mladších 18 let!'
      safety:
        title: 'Bezpečnost'
        description_prefix: 'Produkt prochází dvoustupňovou kontrolou v nezávislých laboratořích'
        description_highlight: 'České republiky'
        description_suffix: '. Testujeme na přítomnost těžkých kovů, patogenní mikroflóry a přesný obsah alkaloidů.'
        button: 'Zobrazit certifikáty'
  consumer_notice:
    eyebrow: 'Informace pro spotřebitele'
    title: 'Důležité bezpečnostní a spotřebitelské informace'
    lead: 'Užívání tohoto výrobku může poškodit Vaše zdraví. Dbejte informací pro spotřebitele.'
    highlights:
      - 'Tento výrobek má psychoaktivní účinky. Tento výrobek není potravinou.'
      - 'Tento výrobek není léčivým přípravkem a nebyl klinicky testován.'
      - 'Pokud si nejste jisti, zda je tento výrobek pro vás vhodný, konzultujte jeho užití s lékařem.'
      - 'Není určeno osobám mladším 18 let. Ukládat mimo dosah osob mladších 18 let.'
      - 'Užívejte v souladu s návodem k použití. Nepřekračujte doporučenou denní dávku.'
    effects_title: 'Účinky'
    effects:
      - 'Při doporučeném dávkování má tento výrobek povzbuzující účinky. Při překročení doporučeného dávkování má tento výrobek tlumivé účinky.'
      - 'Užití tohoto výrobku může ovlivnit bdělost, koordinaci pohybů, koordinaci řeči, rovnováhu, smyslové vnímání, vnímání bolesti, spánek, náladu a funkci imunitního systému. Při dlouhodobém užívání vysokých dávek je možný vznik závislosti. Tento výrobek by se neměl užívat každý den, mezi jednotlivými užitími by měla být přestávka 3 dny. Dlouhodobé účinky na lidské zdraví nejsou dostatečně popsány, obzvláště jde-li o užívání jiné, než je orální užití samotné usušené rostliny.'
    warnings_title: 'Upozornění'
    warnings:
      - 'Neužívejte tento výrobek při, bezprostředně před a v době kratší než 8 hodin před řízením motorového vozidla nebo vykonáváním činnosti, u kterých je vyžadována zvýšená pozornost, schopnost soustředění a koordinace pohybů. Neřiďte motorové vozidlo a nevykonávejte tyto činnosti ani po uplynutí této doby, pokud se cítíte být pod vlivem tohoto výrobku.'
      - 'Tento výrobek není určen osobám mladším 18 let.'
      - 'Neužívejte tento výrobek spolu s dalšími psychoaktivními látkami, alkoholem, nikotinem, léky, ani při těhotenství nebo kojení, nebo pokud trpíte duševním onemocněním nebo tělesným onemocněním s poruchou funkce ledvin, jater, srdce a cév.'
      - 'Existují podezření na otravu kratomem a následné úmrtí.'
    usage_title: 'Návod k použití'
    usage:
      - 'Odměřte 3 g prášku. Doporučená jednorázová dávka činí 3 g.'
      - 'Rozmíchejte ve 100-250 ml vody a vypijte.'
      - 'Maximální doporučená denní dávka činí 10 g.'
      - 'Skladujte v suchu, chladu a mimo dosah dětí.'

en:
  modal_titles:
    certificates: 'Certificates'
    licenses: 'Licenses'
  kratom:
    product:
      age_warning:
        aria_label: '18+ warning'
        line_1: 'Not intended for persons under 18 years of age!'
        line_2: 'Keep out of reach of persons under 18 years of age!'
      safety:
        title: 'Safety'
        description_prefix: 'The product undergoes a two-stage inspection in independent laboratories of'
        description_highlight: 'the Czech Republic'
        description_suffix: '. We test for heavy metals, pathogenic microflora, and precise alkaloid content.'
        button: 'View certificates'
  consumer_notice:
    eyebrow: 'Consumer notice'
    title: 'Important safety and consumer information'
    lead: 'Use of this product may harm your health. Please read the consumer information carefully before use.'
    highlights:
      - 'This product has psychoactive effects and is not a food.'
      - 'This product is not a medicinal product and has not been clinically tested.'
      - 'If you are unsure whether this product is suitable for you, consult a physician before use.'
      - 'Not intended for persons under 18 years of age. Store out of reach of persons under 18 years of age.'
      - 'Use only according to the instructions for use and do not exceed the recommended daily dose.'
    effects_title: 'Effects'
    effects:
      - 'At the recommended dosage, this product has stimulating effects. When the recommended dosage is exceeded, this product has sedative effects.'
      - 'Use of this product may affect alertness, coordination of movement, speech coordination, balance, sensory perception, pain perception, sleep, mood, and immune system function. Long-term use of high doses may lead to dependence. This product should not be used every day; there should be a 3-day break between individual uses. Long-term effects on human health are not sufficiently described, especially in cases of use other than oral use of the dried plant itself.'
    warnings_title: 'Warnings'
    warnings:
      - 'Do not use this product during, immediately before, or less than 8 hours before driving a motor vehicle or performing activities that require increased attention, concentration, and coordination of movement. Do not drive or perform these activities after this time if you still feel under the influence of this product.'
      - 'This product is not intended for persons under 18 years of age.'
      - 'Do not use this product together with other psychoactive substances, alcohol, nicotine, medicines, during pregnancy or breastfeeding, or if you suffer from mental illness or physical illness involving impaired kidney, liver, heart, or vascular function.'
      - 'There are suspicions of kratom poisoning and subsequent death.'
    usage_title: 'Instructions for use'
    usage:
      - 'Measure 3 g of powder. The recommended single dose is 3 g.'
      - 'Stir into 100-250 ml of water and drink.'
      - 'The maximum recommended daily dose is 10 g.'
      - 'Store in a dry, cool place and out of reach of children.'

ru:
  modal_titles:
    certificates: 'Сертификаты'
    licenses: 'Лицензии'
  kratom:
    product:
      age_warning:
        aria_label: 'Предупреждение 18+'
        line_1: 'Не предназначено для лиц младше 18 лет!'
        line_2: 'Хранить в недоступном месте для лиц младше 18 лет!'
      safety:
        title: 'Безопасность'
        description_prefix: 'Продукт проходит двухэтапную проверку в независимых лабораториях'
        description_highlight: 'Чешской Республики'
        description_suffix: '. Мы тестируем продукт на отсутствие тяжелых металлов, отсутствие патогенной микрофлоры и точное содержание алкалоидов.'
        button: 'смотреть сертификаты'
  consumer_notice:
    eyebrow: 'Информация для потребителя'
    title: 'Важная информация по безопасности и употреблению'
    lead: 'Употребление этого продукта может нанести вред вашему здоровью. Внимательно ознакомьтесь с информацией для потребителя.'
    highlights:
      - 'Этот продукт обладает психоактивным действием и не является пищевым продуктом.'
      - 'Этот продукт не является лекарственным средством и не проходил клинических испытаний.'
      - 'Если вы не уверены, подходит ли вам этот продукт, проконсультируйтесь с врачом перед употреблением.'
      - 'Не предназначено для лиц младше 18 лет. Хранить в недоступном для лиц младше 18 лет месте.'
      - 'Используйте только в соответствии с инструкцией и не превышайте рекомендуемую суточную дозу.'
    effects_title: 'Эффекты'
    effects:
      - 'При рекомендуемой дозировке этот продукт оказывает стимулирующее действие. При превышении рекомендуемой дозировки этот продукт оказывает седативное действие.'
      - 'Употребление этого продукта может влиять на бодрствование, координацию движений, координацию речи, равновесие, сенсорное восприятие, восприятие боли, сон, настроение и функцию иммунной системы. При длительном употреблении высоких доз возможно формирование зависимости. Этот продукт не следует употреблять ежедневно; между отдельными употреблениями должен быть перерыв 3 дня. Долгосрочные эффекты для здоровья человека описаны недостаточно, особенно если речь идёт о способе применения, отличном от перорального употребления самого высушенного растения.'
    warnings_title: 'Предупреждение'
    warnings:
      - 'Не употребляйте этот продукт во время, непосредственно перед или менее чем за 8 часов до управления транспортным средством либо выполнения деятельности, требующей повышенного внимания, концентрации и координации движений. Не управляйте транспортным средством и не выполняйте такие действия и по истечении этого времени, если чувствуете, что всё ещё находитесь под влиянием продукта.'
      - 'Этот продукт не предназначен для лиц младше 18 лет.'
      - 'Не употребляйте этот продукт вместе с другими психоактивными веществами, алкоголем, никотином, лекарственными средствами, а также во время беременности или грудного вскармливания, либо если вы страдаете психическим заболеванием или физическим заболеванием с нарушением функции почек, печени, сердца и сосудов.'
      - 'Существуют подозрения на отравление кратомом и последующую смерть.'
    usage_title: 'Инструкция по применению'
    usage:
      - 'Отмерьте 3 г порошка. Рекомендуемая разовая доза составляет 3 г.'
      - 'Размешайте в 100-250 мл воды и выпейте.'
      - 'Максимальная рекомендуемая суточная доза составляет 10 г.'
      - 'Хранить в сухом, прохладном месте и вне доступа детей.'

uk:
  modal_titles:
    certificates: 'Сертифікати'
    licenses: 'Ліцензії'
  kratom:
    product:
      age_warning:
        aria_label: 'Попередження 18+'
        line_1: 'Не призначено для осіб молодших 18 років!'
        line_2: 'Зберігати в недоступному для осіб молодших 18 років місці!'
      safety:
        title: 'Безпека'
        description_prefix: 'Продукт проходить двоетапну перевірку в незалежних лабораторіях'
        description_highlight: 'Чеської Республіки'
        description_suffix: '. Ми тестуємо продукт на відсутність важких металів, патогенної мікрофлори та точний вміст алкалоїдів.'
        button: 'дивитися сертифікати'
  consumer_notice:
    eyebrow: 'Інформація для споживача'
    title: 'Важлива інформація про безпеку та вживання'
    lead: 'Вживання цього продукту може зашкодити вашому здоров’ю. Уважно ознайомтеся з інформацією для споживача перед використанням.'
    highlights:
      - 'Цей продукт має психоактивні властивості та не є харчовим продуктом.'
      - 'Цей продукт не є лікарським засобом і не проходив клінічних випробувань.'
      - 'Якщо ви не впевнені, чи підходить вам цей продукт, проконсультуйтеся з лікарем перед вживанням.'
      - 'Не призначено для осіб молодших 18 років. Зберігати в недоступному для осіб молодших 18 років місці.'
      - 'Використовуйте лише відповідно до інструкції та не перевищуйте рекомендовану добову дозу.'
    effects_title: 'Ефекти'
    effects:
      - 'За рекомендованого дозування цей продукт має стимулювальний ефект. У разі перевищення рекомендованого дозування цей продукт має седативний ефект.'
      - 'Вживання цього продукту може впливати на пильність, координацію рухів, координацію мовлення, рівновагу, сенсорне сприйняття, сприйняття болю, сон, настрій і функцію імунної системи. У разі тривалого вживання високих доз можливе формування залежності. Цей продукт не слід вживати щодня; між окремими вживаннями має бути перерва 3 дні. Довгострокові наслідки для здоров’я людини описані недостатньо, особливо якщо йдеться про спосіб застосування, відмінний від перорального вживання самої висушеної рослини.'
    warnings_title: 'Попередження'
    warnings:
      - 'Не вживайте цей продукт під час, безпосередньо перед або менш ніж за 8 годин до керування транспортним засобом чи виконання діяльності, яка потребує підвищеної уваги, концентрації та координації рухів. Не керуйте транспортним засобом і не виконуйте таких дій і після спливу цього часу, якщо відчуваєте, що все ще перебуваєте під впливом продукту.'
      - 'Цей продукт не призначений для осіб молодших 18 років.'
      - 'Не вживайте цей продукт разом з іншими психоактивними речовинами, алкоголем, нікотином, лікарськими засобами, а також під час вагітності чи грудного вигодовування, або якщо ви страждаєте на психічне захворювання чи фізичне захворювання з порушенням функції нирок, печінки, серця та судин.'
      - 'Існують підозри на отруєння кратомом і подальшу смерть.'
    usage_title: 'Інструкція із застосування'
    usage:
      - 'Відміряйте 3 г порошку. Рекомендована разова доза становить 3 г.'
      - 'Розмішайте у 100-250 мл води та випийте.'
      - 'Максимальна рекомендована добова доза становить 10 г.'
      - 'Зберігати в сухому, прохолодному місці та поза доступом дітей.'

