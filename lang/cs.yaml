      title: "O VivaDzen Kratom | Certifikovaný prodejce v Česku"
      description: "Seznamte se s VivaDzen: výrobcem a prodejcem kratomu pro Českou republiku s laboratorní kontrolou, certifikáty a kamennou prodejnou v Praze."
    contacts:
      title: "Kontakty a prodejna v Praze | VivaDzen Kratom"
      description: "Kontaktujte VivaDzen Kratom, najděte naši prodejnu v Praze a podporu pro objednávky kratomu v České republice."
    reviews:
      title: "Recenze zákazníků | VivaDzen Kratom"
      description: "Ověřené zkušenosti zákazníků VivaDzen s kratomem, doručením, podporou a nákupem v České republice."
    policy:
      title: "Zásady ochrany osobních údajů | VivaDzen Kratom"
      description: "Informace o zpracování osobních údajů zákazníků VivaDzen Kratom při objednávce, platbě, doručení a kontaktu s podporou."
    terms:
      title: "Podmínky použití a nákupu | VivaDzen Kratom"
      description: "Obchodní podmínky VivaDzen Kratom pro nákup certifikovaného kratomu v České republice, doručení, platby a věkové ověření 18+."
    returns:
      title: "Vrácení zboží a reklamace | VivaDzen Kratom"
      description: "Podmínky vrácení zboží a reklamací pro objednávky VivaDzen Kratom v České republice."
    delivery:
      title: "Doručení | VivaDzen Kratom"
