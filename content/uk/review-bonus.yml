title: "Отримуйте {pointsName} за корисний відгук"
items:
  - type: cta
    text: "Залиште відгук про товар чи магазин та отримуйте {pointsName} на Vivadzen.com"
  - type: text
    text: "Перейдіть на сторінку потрібного товару й оберіть формат відгуку — текст, фото або відео"
  - type: text
    text: "Текстовий, фото- чи відеовідгук про магазин загалом можна залишити просто на цій сторінці"
  - type: text
    text: "Щоб отримати винагороду за текстовий відгук, додайте посилання на свій профіль у соцмережі"
  - type: text
    text: "Для фото- та відеовідгуків посилання на соцмережу не обов’язкове — бонус нараховуємо після публікації"
  - type: highlight
    before: "Після модерації відгук з’являється на Vivadzen,"
    highlight: "бонус одразу надходить на ваш рахунок {pointsName}"
    after: " — його можна витратити на покупку або вивести на картку"
  - type: manual
    text: "про бонусну систему Vivadzen."
    button:
      label: "Детальніше"
      link: "/vivapoints"
