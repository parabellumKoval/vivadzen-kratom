title: "Получите {pointsName} за ценный отзыв"
items:
  - type: cta
    text: "Оставьте отзыв о товаре или магазине и получайте {pointsName} на Vivadzen.com"
  - type: text
    text: "Перейдите на страницу нужного товара и выберите формат отзыва — текст, фото или видео"
  - type: text
    text: "Оставить текстовый, фото- или видео-отзыв о магазине в целом вы можите прямо с этой страницы"
  - type: text
    text: "Чтобы получить награду за текстовый отзыв, прикрепите ссылку на свой профиль в соцсети"
  - type: text
    text: "Для фото- и видео-отзывов ссылка на соцсеть не обязательна — бонус начислим после публикации"
  - type: highlight
    before: "После модерации отзыв появляется на Vivadzen,"
    highlight: "бонус сразу поступает на ваш счёт {pointsName}"
    after: " — им можно оплатить заказ или вывести на карту"
  - type: manual
    text: "о бонусной системе Vivadzen."
    button: 
      label: "Читайте подробнее"
      link: "/vivapoints"
